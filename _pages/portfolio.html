---
layout: archive
title: "Portfolio"
permalink: /portfolio/

---
<div class="portfolio-archive">
  {% for post in site.portfolio %}
    <div class="portfolio-item">
      <a href="{{ post.url }}">
        <img src="{{ post.image }}" 
             alt="{{ post.title }}" 
             onmouseover="this.src='{{ post.hover_image }}'" 
             onmouseout="this.src='{{ post.image }}'">
      </a>
      </div>
  {% endfor %}
</div>

<style>
.portfolio-archive {
  display: flex;
  flex-wrap: wrap;
  gap: 20px; /* Adjust spacing between items */
}

.portfolio-item {
  flex: 1 1 calc(50% - 20px); /* Controls number of items per row */
  box-sizing: border-box;
  text-align: center;
}

.portfolio-item img {
  width: 500px; /* Set the width */
  height: 300px; /* Set the height */
  object-fit: cover; /* Maintain aspect ratio and fill the container */}

.portfolio-item h2 {
  margin-top: 10px;
}

.portfolio-item p {
  margin-top: 5px;
}
</style>
