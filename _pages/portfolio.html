---
layout: archive
title: "Portfolio"
permalink: /portfolio/

---
<div class="portfolio-archive">
  {% for post in site.portfolio %}
    <div class="portfolio-item">
      <a href="{{ post.url }}">
        <div class="image-container">
          <img src="{{ post.image }}" alt="{{ post.title }}" title="{{ post.title }}">
          <div class="overlay">
            <p class="overlay-title">{{ post.title }}</p>
          </div>
        </div>
      </a>
      <p><b>{{ post.title }}</b></p>
    </div>
  {% endfor %}
</div>

<style>
.portfolio-archive {
  display: flex;
  flex-wrap: wrap;
  gap: 20px; /* Adjust spacing between items */
}

.portfolio-item {
  flex: 1 1 calc(50% - 20px); /* Controls number of items per row */
  box-sizing: border-box;
  text-align: center;
}

.image-container {
  position: relative;
  width: 500px; /* Set the width */
  height: 300px; /* Set the height */
}

.image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7); /* Grey background with opacity */
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.image-container:hover .overlay {
  opacity: 1;
}

.overlay-title {
  font-size: 1.2em;
  text-align: center;
  padding: 10px;
}

.portfolio-item h2 {
  margin-top: 10px;
}

.portfolio-item p {
  margin-top: 5px;
}
</style>
